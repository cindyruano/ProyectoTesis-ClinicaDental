<ion-content [fullscreen]="true" class="map-page">

  <div id="map"></div>

  <div class="floating-header">
    <ion-grid class="ion-no-padding">
      <ion-row class="ion-align-items-center">
        <ion-col size="2">
          <ion-button fill="clear" class="back-btn" (click)="goBack()">
            <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
          </ion-button>
        </ion-col>
        <ion-col size="8" class="ion-text-center">
          <h1 class="page-title">Ubicación</h1>
        </ion-col>
        <ion-col size="2" class="ion-text-end">
          <ion-avatar class="user-avatar" (click)="viewProfile()">
            <img [src]="profileImage" alt="Perfil">
          </ion-avatar>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <div class="map-controls">
    <button class="control-btn" (click)="recenterToUser()">
      <ion-icon name="locate-outline"></ion-icon>
    </button>
    <button class="control-btn" (click)="toggleMapLayer()">
      <ion-icon name="layers-outline"></ion-icon>
    </button>
  </div>

  <div class="info-card-container"
       [class.hidden-card]="isCardHidden"
       (click)="recenterToClinic()">

    <div class="info-card">
      <div class="card-header">
        <div>
          <span class="subtitle">SEDE PRINCIPAL</span>
          <h2 class="clinic-name">DentalClinic Spa & Dental</h2>
        </div>
        <div class="verified-badge">
          <ion-icon name="checkmark-circle"></ion-icon>
        </div>
      </div>

      <div class="card-body">
        <div class="info-row">
          <ion-icon name="location"></ion-icon>
          <p>Av. del Valle 452, Jardines de la Paz</p>
        </div>
        <div class="info-row">
          <ion-icon name="call"></ion-icon>
          <p>+34 912 345 678</p>
        </div>
        <div class="info-row">
          <ion-icon name="time"></ion-icon>
          <p>Abierto hoy: 08:00 – 21:00</p>
        </div>
      </div>

      <button class="directions-btn" (click)="$event.stopPropagation(); openNavigation()">
        <ion-icon name="navigate-circle-outline"></ion-icon>
        <span>Cómo llegar</span>
      </button>
    </div>
  </div>
  </ion-content>
