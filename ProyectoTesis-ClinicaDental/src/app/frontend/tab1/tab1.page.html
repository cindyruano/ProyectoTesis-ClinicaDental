<ion-content [fullscreen]="true">
  <div class="header-container">
    <ion-grid class="ion-no-padding">
      <ion-row class="ion-align-items-center">
        <ion-col size="9" class="brand-section">
          <ion-avatar class="user-avatar" (click)="viewProfile()">
            <img [src]="profileImage" alt="Perfil">
          </ion-avatar>
          <h1 class="business-title">DentalClinic</h1>
        </ion-col>
        <ion-col size="3" class="ion-text-end">
          <ion-button fill="clear" (click)="toggleNotification()" [color]="notifActive ? 'primary' : 'inverted'">
            <ion-icon slot="icon-only" name="notifications"></ion-icon>
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <div class="standalone-welcome">
    <h1 class="welcome-title">Hola, {{ userName }}</h1>
    <p class="welcome-subtitle">Tu salud dental es nuestra prioridad hoy.</p>
  </div>

  <div class="upcoming-appointment-container">
    <button class="upcoming-card" (click)="goToHistorialCitas()">
      <div class="upcoming-icon-wrapper">
        <ion-icon name="calendar-outline"></ion-icon>
      </div>
      <div class="upcoming-info">
        <h4>Próxima Cita</h4>
        <p>14 Oct • {{ proximaCita.hora }} • {{ proximaCita.doctor }}</p>
      </div>
      <ion-icon class="upcoming-arrow" name="chevron-forward"></ion-icon>
    </button>
  </div>

  <div class="health-container-clean">
    <div class="health-left-col">
      <div class="status-icon-wrapper">
        <div class="outer-circle">
          <div class="inner-circle">
            <ion-button fill="clear" class="emoji-btn" (click)="openHealthDetails()">
              <ion-icon name="happy"></ion-icon>
            </ion-button>
          </div>
        </div>
      </div>
    </div>
    <div class="health-right-col">
      <h2 class="section-title-health">Salud Dental</h2>
      <div class="progress-section">
        <div class="progress-labels">
          <span class="progress-text">Progreso de Tratamiento</span>
          <span class="progress-number">{{ saludPorcentaje }}%</span>
        </div>
        <div class="progress-bar-container">
          <div class="progress-fill" [style.width.%]="saludPorcentaje"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="treatment-section-actions">
    <div class="horizontal-scroll-container-actions">
      <div class="treatment-box-action" (click)="agendarCita()">
        <div class="icon-wrapper-action">
          <ion-icon name="add-outline"></ion-icon>
        </div>
        <h3>Agendar Cita</h3>
      </div>
      <div class="treatment-box-action" (click)="chatIA()">
        <div class="icon-wrapper-action">
          <ion-icon name="chatbubble-ellipses"></ion-icon>
        </div>
        <h3>Chat con IA</h3>
      </div>

      <div class="treatment-box-action" (click)="pagos()">
        <div class="icon-wrapper-action">
          <ion-icon name="card-outline"></ion-icon>
        </div>
        <h3>Pagos</h3>
      </div>

    </div>
  </div>

  <div class="promo-section-v2">
    <h2 class="section-title">Novedades</h2>
    <div class="promo-scroll-container">
      <div class="promo-card-v2" *ngFor="let promo of promociones" (click)="verDetallePromo(promo)">
        <img [src]="promo.img" [alt]="promo.title" class="promo-bg-img">
        <div class="promo-gradient-overlay"></div>
        <div class="promo-content-v2">
          <span class="promo-badge-v2">PROMO EXCLUSIVA</span>
          <h2 class="promo-title-v2">{{ promo.title }}</h2>
          </div>
      </div>
    </div>
  </div>

  <div class="tip-container-v2">
    <div class="tip-card-v2">
      <div class="tip-header-v2">
        <div class="tip-icon-btn-v2">
          <ion-icon name="bulb-outline"></ion-icon>
        </div>
      </div>
      <div class="tip-info-v2">
        <h4>Tip de la semana</h4>
        <p>{{ tipDeLaSemana }}</p>
      </div>
    </div>
  </div>

</ion-content>
