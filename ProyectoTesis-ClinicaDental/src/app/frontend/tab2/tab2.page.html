<ion-content [fullscreen]="true">
  <div class="header-container">
    <ion-grid class="ion-no-padding">
      <ion-row class="ion-align-items-center">
        <ion-col size="9" class="brand-section">
          <ion-avatar class="user-avatar" (click)="viewProfile()">
            <img src="assets/icon/usuario.webp" alt="Perfil">
          </ion-avatar>
          <h1 class="business-title">DentalClinic</h1>
        </ion-col>
        <ion-col size="3" class="ion-text-end">
          <ion-button fill="clear" (click)="toggleNotification()" [color]="notifActive ? 'primary' : 'inverted'">
            <ion-icon slot="icon-only" name="notifications"></ion-icon>
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <div class="treatment-section">
    <div class="section-header-inline">
      <h2 class="section-title-small">SELECCIONAR SERVICIO</h2>
      <ion-button fill="clear" (click)="viewMoreTreatments()" class="view-more-btn">
        Ver más
      </ion-button>
    </div>

    <ion-grid class="ion-no-padding">
      <ion-row>
        <ion-col size="4">
          <div class="treatment-box" [class.selected]="tratamientoSeleccionado === 'limpieza'" (click)="seleccionar('limpieza')">
            <div class="icon-wrapper">
              <ion-icon name="sparkles-outline"></ion-icon>
            </div>
            <h3>Limpieza</h3>
          </div>
        </ion-col>

        <ion-col size="4">
          <div class="treatment-box" [class.selected]="tratamientoSeleccionado === 'ortodoncia'" (click)="seleccionar('ortodoncia')">
            <div class="icon-wrapper">
              <ion-icon name="medkit-outline"></ion-icon>
            </div>
            <h3>Ortodoncia</h3>
          </div>
        </ion-col>

        <ion-col size="4">
          <div class="treatment-box" [class.selected]="tratamientoSeleccionado === 'estetica'" (click)="seleccionar('estetica')">
            <div class="icon-wrapper">
              <ion-icon name="color-wand-outline"></ion-icon>
            </div>
            <h3>Estética</h3>
          </div>
        </ion-col>

        <ion-col size="4">
          <div class="treatment-box" [class.selected]="tratamientoSeleccionado === 'extraccion'" (click)="seleccionar('extraccion')">
            <div class="icon-wrapper">
              <ion-icon name="bandage-outline"></ion-icon>
            </div>
            <h3>Extracción</h3>
          </div>
        </ion-col>

        <ion-col size="4">
          <div class="treatment-box" [class.selected]="tratamientoSeleccionado === 'chequeo'" (click)="seleccionar('chequeo')">
            <div class="icon-wrapper">
              <ion-icon name="pulse-outline"></ion-icon>
            </div>
            <h3>Chequeo</h3>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <div class="calendar-container">
    <div class="calendar-header">
      <button class="month-year-picker-btn" (click)="openMonthYearPicker()">
        {{ currentMonthName | uppercase }} {{ currentYear }}
      </button>
      <div class="nav-arrows">
        <ion-button fill="clear" (click)="prevMonth()">
          <ion-icon slot="icon-only" name="chevron-back-outline"></ion-icon>
        </ion-button>
        <ion-button fill="clear" (click)="nextMonth()">
          <ion-icon slot="icon-only" name="chevron-forward-outline"></ion-icon>
        </ion-button>
      </div>
    </div>

    <div class="calendar-card">
      <div class="weeks-grid">
        <span class="week-day">Lu</span>
        <span class="week-day">Ma</span>
        <span class="week-day">Mi</span>
        <span class="week-day">Ju</span>
        <span class="week-day">Vi</span>
        <span class="week-day">Sa</span>
        <span class="week-day">Do</span>
      </div>

      <div class="days-grid">
        <span *ngFor="let empty of blankDays" class="day-number prev-month">
          {{ empty }}
        </span>
        <button
          *ngFor="let day of daysInMonth"
          class="day-number"
          [class.selected]="isSelected(day)"
          (click)="selectDate(day)">
          {{ day }}
        </button>
      </div>
    </div>

    <ion-datetime
      #datetimePicker
      presentation="month-year"
      class="hidden-picker"
      (ionChange)="onMonthYearChange($event)">
    </ion-datetime>
  </div>

  <div class="slots-section">
    <h2 class="section-title-slots">Horarios Disponibles</h2>

    <div class="slots-container">
      <div class="slots-grid" *ngIf="availableSlots.length > 0">
        <button
          *ngFor="let slot of availableSlots"
          class="slot-btn"
          [class.selected]="selectedSlot === slot.time"
          [class.disabled]="slot.disabled"
          [disabled]="slot.disabled"
          (click)="selectSlot(slot.time)">
          {{ slot.time }}
        </button>
      </div>

      <div class="no-slots-alert" *ngIf="availableSlots.length === 0">
        <ion-icon name="calendar-clear-outline"></ion-icon>
        <p>No hay horarios disponibles para este día.</p>
      </div>
    </div>
  </div>

  <div class="actions-container">
    <ion-button class="calendar-sync-btn" (click)="addToCalendar()">
      <ion-icon slot="start" name="calendar-number-outline"></ion-icon>
      Agregar a Calendario
    </ion-button>

    <ion-button class="confirm-appointment-btn" (click)="confirmAppointment()">
      <ion-icon slot="start" name="checkmark-circle-outline"></ion-icon>
      Confirmar Cita
    </ion-button>
  </div>
</ion-content>
