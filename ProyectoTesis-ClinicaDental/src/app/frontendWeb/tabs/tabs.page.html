<div class="web-layout">

  <!-- BARRA LATERAL (SIDEBAR) -->
  <aside class="sidebar">
    <!-- Logotipo y Nombre Clínica -->
    <div class="sidebar-header">
      <ion-icon name="medical-sharp" class="header-logo-icon"></ion-icon>
      <div class="header-text">
        <h2>MODent</h2>
        <span>Gestión Clínica</span>
      </div>
    </div>

    <!-- Menú de Navegación -->
    <nav class="sidebar-menu">
      <a routerLink="/admin/tab1" routerLinkActive="active-item" class="menu-item">
        <ion-icon name="grid-sharp"></ion-icon>
        <span>Tablero</span>
      </a>

      <a routerLink="/admin/tab2" routerLinkActive="active-item" class="menu-item">
        <ion-icon name="calendar-sharp"></ion-icon>
        <span>Agenda</span>
      </a>

      <a routerLink="/admin/tab3" routerLinkActive="active-item" class="menu-item">
        <ion-icon name="people-sharp"></ion-icon>
        <span>Pacientes</span>
      </a>

      <a routerLink="/admin/tab4" routerLinkActive="active-item" class="menu-item">
        <ion-icon name="pulse-sharp"></ion-icon>
        <span>Doctores</span>
      </a>

      <a routerLink="/admin/tab5" routerLinkActive="active-item" class="menu-item">
        <ion-icon name="cash-sharp"></ion-icon>
        <span>Finanzas</span>
      </a>
    </nav>

    <!-- Perfil del Administrador + Cerrar Sesión -->
    <div class="sidebar-footer">
      <div class="profile-section">
        <div class="profile-avatar">
          <span>MM</span>
        </div>
        <div class="profile-info">
          <h4>Dra. Montenegro</h4>
          <span>ADMINISTRADOR</span>
        </div>
        <!-- BOTÓN DE CERRAR SESIÓN -->
        <button class="logout-btn" (click)="onLogout()" title="Cerrar Sesión">
          <ion-icon name="log-out-outline"></ion-icon>
        </button>
      </div>
    </div>
  </aside>

  <!-- CONTENEDOR DE LAS PÁGINAS -->
  <main class="web-main-content">
    <router-outlet></router-outlet>
  </main>

</div>
