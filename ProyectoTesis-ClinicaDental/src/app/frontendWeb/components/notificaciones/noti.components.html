<div class="notifications-container">
  <!-- Botón de la Campana -->
  <button class="icon-btn" (click)="toggleNotifications()" [class.active]="showNotifications" type="button">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
    </svg>

    <!-- Insignia / Badge con el número de no leídas -->
    <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
  </button>

  <!-- Pestaña Flotante / Dropdown -->
  <div class="notifications-dropdown" *ngIf="showNotifications">
    <div class="dropdown-header">
      <h3>Notificaciones</h3>
      <button class="btn-link" (click)="markAllAsRead()" *ngIf="unreadCount > 0">
        Marcar leídas
      </button>
    </div>

    <div class="dropdown-body">
      <div
        class="notification-item"
        *ngFor="let item of notifications"
        [class.unread]="!item.read"
      >
        <div class="item-dot" *ngIf="!item.read"></div>
        <div class="item-content">
          <p class="title">{{ item.title }}</p>
          <span class="time">{{ item.time }}</span>
        </div>
      </div>

      <!-- Estado vacío si no hay notificaciones -->
      <div class="empty-state" *ngIf="notifications.length === 0">
        <p>No tienes notificaciones pendientes</p>
      </div>
    </div>

    <div class="dropdown-footer">
      <span>Historial de avisos</span>
    </div>
  </div>
</div>
