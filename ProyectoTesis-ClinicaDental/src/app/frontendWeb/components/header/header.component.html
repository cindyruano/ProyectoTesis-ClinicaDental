<!-- 1. CABECERA GLOBAL SUPERIOR -->
<header class="global-app-header">
  <div class="header-left-actions">
    <button *ngIf="mostrarBotonVolver" (click)="onVolver()" class="btn-back-link">
      <ion-icon name="chevron-back-outline"></ion-icon>
      <span>{{ textoVolver }}</span>
    </button>
  </div>

  <div class="header-right-actions">
    <div class="search-box" *ngIf="mostrarBuscador">
      <ion-icon name="search-outline" class="search-icon"></ion-icon>
      <input
        type="text"
        [placeholder]="placeholderBuscador"
        class="search-input"
        [value]="textoBusqueda"
        (input)="onInputBusqueda($event)" />
    </div>

    <!-- NOTIFICACIONES -->
    <app-notifications></app-notifications>

    <!-- BOTÓN SEGURIDAD -->
    <button class="icon-btn shield-btn" title="Seguridad">
      <ion-icon name="shield-checkmark-outline"></ion-icon>
    </button>
  </div>
</header>

<!-- 2. SUBBARRA CLÍNICA -->
<div class="clinical-subheader-row">
  <div class="header-left-brand">

    <div class="brand-logo-circle">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="brand-svg-icon">
        <g fill="currentColor">
          <rect x="9.75" y="1.5" width="4.5" height="21" />
          <rect x="9.75" y="1.5" width="4.5" height="21" transform="rotate(60 12 12)" />
          <rect x="9.75" y="1.5" width="4.5" height="21" transform="rotate(120 12 12)" />
        </g>
      </svg>
    </div>

    <div class="brand-titles-stack">
      <h1>{{ titulo }}</h1>
      <h2>{{ subtitulo }}</h2>
      <h3>{{ tag3 }}</h3>
    </div>
  </div>

  <!-- CONTENEDOR DE BOTONES DERECHA -->
  <div class="header-actions-relocated">
    <ng-content></ng-content>
  </div>
</div>
