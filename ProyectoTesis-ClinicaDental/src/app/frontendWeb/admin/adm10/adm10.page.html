<ion-content [fullscreen]="true" class="finanzas-content">
  <div class="dashboard-viewport">
    <main class="main-workspace">

      <!-- HEADER CENTRALIZADO (SIN BARRA DE BÚSQUEDA) -->
      <app-header
        [titulo]="'ODONTOLOGÍA INCLUSIVA'"
        [subtitulo]="'Odontólogos Sociales y Comunitarios'"
        [tag3]="'REGISTRO DE MOVIMIENTO FINANCIERO'"
        [icono]="'medical-sharp'"
        [mostrarBuscador]="false"
        [mostrarBotonVolver]="true"
        [textoVolver]="'Volver a Finanzas'"
        (volverClick)="volverAAdm9()">
      </app-header>

      <!-- CONTENEDOR PRINCIPAL DEL FORMULARIO -->
      <div class="finanzas-workspace-content">
        <div class="form-card">
          <div class="form-header">
            <h2>
              <ion-icon name="cash-outline"></ion-icon>
              Nuevo Registro Financiero
            </h2>
            <p>Ingresa los detalles correspondientes a tratamientos, ventas directas de productos o gastos clínicos.</p>
          </div>

          <form (ngSubmit)="guardarMovimiento()" class="form-body">

            <!-- SELECCIÓN DE TIPO DE OPERACIÓN -->
            <div class="form-group full-width">
              <label class="section-label">Tipo de Movimiento</label>
              <div class="type-selector-grid">
                <button
                  type="button"
                  class="type-btn"
                  [class.active]="tipoMovimiento === 'TRATAMIENTO'"
                  (click)="setTipoMovimiento('TRATAMIENTO')">
                  <ion-icon name="medical-outline"></ion-icon>
                  <span>Tratamiento Clínico</span>
                </button>

                <button
                  type="button"
                  class="type-btn"
                  [class.active]="tipoMovimiento === 'PRODUCTO'"
                  (click)="setTipoMovimiento('PRODUCTO')">
                  <ion-icon name="cart-outline"></ion-icon>
                  <span>Venta de Producto</span>
                </button>

                <button
                  type="button"
                  class="type-btn gasto"
                  [class.active]="tipoMovimiento === 'GASTO'"
                  (click)="setTipoMovimiento('GASTO')">
                  <ion-icon name="trending-down-outline"></ion-icon>
                  <span>Gasto Operativo</span>
                </button>
              </div>
            </div>

            <!-- CAMPOS DEL FORMULARIO -->
            <div class="form-grid">

              <div class="form-group">
                <label for="catalogo">
                  {{ tipoMovimiento === 'TRATAMIENTO' ? 'Tratamiento' : (tipoMovimiento === 'PRODUCTO' ? 'Producto' : 'Categoría de Gasto') }}
                </label>
                <select id="catalogo" class="custom-input" (change)="onSeleccionarOpcionCat($event)">
                  <option value="" disabled selected>-- Seleccione una opción --</option>
                  <option *ngFor="let item of catalogoActual" [value]="item.nombre">
                    {{ item.nombre }} {{ item.precioBase ? ('(Q ' + (item.precioBase | number:'1.2-2') + ')') : '' }}
                  </option>
                </select>
              </div>

              <div class="form-group">
                <label for="entidad">
                  {{ tipoMovimiento === 'GASTO' ? 'Proveedor / Destinatario' : 'Paciente / Cliente' }}
                </label>
                <input
                  type="text"
                  id="entidad"
                  class="custom-input"
                  [(ngModel)]="movimiento.entidad"
                  name="entidad"
                  placeholder="Ej. Carlos Mendoza o Depósito Dental"
                  required />
              </div>

              <div class="form-group full-width">
                <label for="concepto">Concepto / Descripción</label>
                <input
                  type="text"
                  id="concepto"
                  class="custom-input"
                  [(ngModel)]="movimiento.concepto"
                  name="concepto"
                  placeholder="Detalle de la transacción"
                  required />
              </div>

              <div class="form-group">
                <label for="monto">Monto (Q)</label>
                <input
                  type="number"
                  step="0.01"
                  min="0"
                  id="monto"
                  class="custom-input amount-input"
                  [(ngModel)]="movimiento.monto"
                  name="monto"
                  placeholder="0.00"
                  required />
              </div>

              <div class="form-group">
                <label for="fecha">Fecha</label>
                <input
                  type="date"
                  id="fecha"
                  class="custom-input"
                  [(ngModel)]="movimiento.fecha"
                  name="fecha"
                  required />
              </div>

              <div class="form-group">
                <label for="estado">Estado</label>
                <select id="estado" class="custom-input" [(ngModel)]="movimiento.estado" name="estado">
                  <option value="Completado">Completado</option>
                  <option value="Pendiente">Pendiente</option>
                </select>
              </div>

            </div>

            <!-- BOTÓN GUARDAR MOVIMIENTO -->
            <div class="form-actions">
              <button type="submit" class="btn-primary">
                <ion-icon name="checkmark-circle-outline"></ion-icon>
                Guardar Movimiento
              </button>
            </div>

          </form>
        </div>
      </div>

    </main>
  </div>
</ion-content>
