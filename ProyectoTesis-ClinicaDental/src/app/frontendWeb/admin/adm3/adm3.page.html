<ion-content [fullscreen]="true" class="agenda-content">
  <div class="dashboard-viewport">
    <main class="main-workspace">

      <!-- HEADER CENTRALIZADO Y REUTILIZABLE -->
      <app-header
        [titulo]="'AGENDA MÉDICA'"
        [subtitulo]="'Odontólogos Sociales y Comunitarios'"
        [tag3]="'REGISTRO Y PROGRAMACIÓN DE NUEVA CITA'"
        [icono]="'calendar-outline'"
        [mostrarBuscador]="false"
        [mostrarBotonVolver]="true"
        [textoVolver]="'Volver al Directorio'"
        (volverClick)="cancelar()">

        <div class="unregistered-patient-banner">
          <div class="banner-info">
            <ion-icon name="alert-circle-outline"></ion-icon>
            <span>¿Es la primera vez del paciente?</span>
          </div>
          <button type="button" class="btn-create-ficha" (click)="irACrearFichaClinica()">
            <ion-icon name="document-text-outline"></ion-icon>
            Crear Ficha Clínica
          </button>
        </div>
      </app-header>

      <!-- WORKSPACE DEL FORMULARIO -->
      <div class="form-workspace-content">
        <div class="form-card-container">

          <div class="form-card-header">
            <div class="header-title-box">
              <h2><ion-icon name="add-circle-outline"></ion-icon> Agendar Nueva Cita</h2>
              <p>Ingresa los datos del paciente y asigna la cita al profesional correspondiente.</p>
            </div>
          </div>

          <form (ngSubmit)="guardarCita()" class="appointment-form">

            <div class="form-grid">

              <div class="form-group full-width">
                <label for="paciente">Nombre Completo del Paciente * <span class="helper-text">(Presiona ENTER para buscar paciente)</span></label>
                <div class="input-icon-wrapper">
                  <ion-icon name="person-outline"></ion-icon>
                  <input type="text"
                         id="paciente"
                         placeholder="Ej. Carlos Mendoza (Escribe y presiona Enter...)"
                         [(ngModel)]="nuevaCitaData.pacienteNombre"
                         (keyup.enter)="buscarYAutocompletarPaciente()"
                         name="pacienteNombre"
                         required />
                  <span *ngIf="cargandoPaciente" class="spinner-inline">
                    <ion-spinner name="crescent"></ion-spinner>
                  </span>
                </div>
              </div>

              <!-- Teléfono -->
              <div class="form-group">
                <label for="telefono">Teléfono / Celular *</label>
                <div class="input-icon-wrapper">
                  <ion-icon name="call-outline"></ion-icon>
                  <input type="tel"
                         id="telefono"
                         placeholder="Ej. 5555-1234"
                         [(ngModel)]="nuevaCitaData.telefono"
                         name="telefono"
                         required />
                </div>
              </div>

              <!-- Doctor Asignado -->
              <div class="form-group">
                <label for="doctor">Doctor / Especialista *</label>
                <div class="input-icon-wrapper">
                  <ion-icon name="medkit-outline"></ion-icon>
                  <select id="doctor"
                          [(ngModel)]="nuevaCitaData.doctorKey"
                          name="doctorKey"
                          required>
                    <option value="melissa">Dra. Melissa Montenegro (Ortodoncia)</option>
                    <option value="doctor2">Dr. Juan Pérez (Endodoncia)</option>
                    <option value="doctor3">Dra. Ana Gómez (Ortodoncia)</option>
                    <option value="doctor4">Dr. Carlos Ruíz (Cirugía)</option>
                  </select>
                </div>
              </div>

              <!-- Categoría / Especialidad -->
              <div class="form-group">
                <label for="categoria">Categoría / Especialidad *</label>
                <div class="input-icon-wrapper">
                  <ion-icon name="pulse-outline"></ion-icon>
                  <select id="categoria"
                          [(ngModel)]="nuevaCitaData.categoria"
                          name="categoria"
                          required>
                    <option value="orthodontics">Ortodoncia</option>
                    <option value="surgery">Cirugía</option>
                    <option value="cleaning">Limpieza</option>
                    <option value="reserved">Reservado</option>
                  </select>
                </div>
              </div>

              <!-- Tratamiento -->
              <div class="form-group">
                <label for="tratamiento">Tratamiento / Motivo *</label>
                <div class="input-icon-wrapper">
                  <ion-icon name="document-text-outline"></ion-icon>
                  <input type="text"
                         id="tratamiento"
                         placeholder="Ej. Evaluación y Limpieza Dental"
                         [(ngModel)]="nuevaCitaData.tratamiento"
                         name="tratamiento"
                         required />
                </div>
              </div>

              <!-- Fecha -->
              <div class="form-group">
                <label for="fecha">Fecha de Cita *</label>
                <div class="input-icon-wrapper">
                  <ion-icon name="calendar-clear-outline"></ion-icon>
                  <input type="date"
                         id="fecha"
                         [(ngModel)]="nuevaCitaData.fechaStr"
                         name="fechaStr"
                         required />
                </div>
              </div>

              <!-- Hora -->
              <div class="form-group">
                <label for="hora">Horario *</label>
                <div class="input-icon-wrapper">
                  <ion-icon name="time-outline"></ion-icon>
                  <select id="hora"
                          [(ngModel)]="nuevaCitaData.hora"
                          name="hora"
                          required>
                    <option value="08:00 AM">08:00 AM</option>
                    <option value="09:00 AM">09:00 AM</option>
                    <option value="10:00 AM">10:00 AM</option>
                    <option value="11:00 AM">11:00 AM</option>
                    <option value="12:00 PM">12:00 PM</option>
                    <option value="01:00 PM">01:00 PM</option>
                    <option value="02:00 PM">02:00 PM</option>
                    <option value="03:00 PM">03:00 PM</option>
                    <option value="04:00 PM">04:00 PM</option>
                  </select>
                </div>
              </div>

              <!-- Notas -->
              <div class="form-group full-width">
                <label for="notas">Notas / Observaciones Médicas</label>
                <textarea id="notas"
                          rows="3"
                          placeholder="Añade observaciones adicionales..."
                          [(ngModel)]="nuevaCitaData.notas"
                          name="notas"></textarea>
              </div>
            </div>

            <!-- Botones de Acción -->
            <div class="form-actions-row">
              <button type="button" class="btn-cancel" (click)="cancelar()">
                Cancelar
              </button>
              <button type="submit" class="btn-save">
                <ion-icon name="checkmark-outline"></ion-icon>
                Confirmar y Agendar
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>
</ion-content>
