<ion-content [fullscreen]="true" class="perfil-content">
  <div class="dashboard-viewport">
    <main class="main-workspace">

      <!-- CABECERA GLOBAL SUPERIOR (SIN BOTÓN VOLVER Y SIN BUSCADOR) -->
      <header class="global-app-header">
        <div class="header-left-empty"></div>

        <div class="header-right-actions">
          <button class="icon-btn notification-btn" title="Notificaciones">
            <ion-icon name="notifications-outline"></ion-icon>
            <span class="notification-dot"></span>
          </button>
          <button class="icon-btn shield-btn" title="Seguridad">
            <ion-icon name="shield-checkmark-outline"></ion-icon>
          </button>
        </div>
      </header>

      <!-- SUBBARRA CONTENEDORA DE BRANDING -->
      <div class="clinical-subheader-row">
        <div class="header-left-brand">
          <div class="brand-logo-circle">
            <ion-icon name="medical-sharp"></ion-icon>
          </div>
          <div class="brand-titles-stack">
            <h1>ODONTOLOGÍA INCLUSIVA</h1>
            <h2>Odontólogos Sociales y Comunitarios</h2>
            <h3>PERFIL DE ADMINISTRADOR — GESTIÓN DE CUENTA Y SEGURIDAD</h3>
          </div>
        </div>
      </div>

      <!-- WORKSPACE DEL PERFIL -->
      <div class="perfil-workspace-content">
        <main class="form-card">

          <!-- INPUT OCULTO PARA EXPLORADOR DE ARCHIVOS DE ESCRITORIO -->
          <input
            type="file"
            #fileInput
            (change)="onFotoSeleccionada($event)"
            accept="image/*"
            style="display: none;" />

          <!-- CABECERA DE USUARIO / AVATAR -->
          <div class="profile-header-box">
            <div class="avatar-large">
              <!-- Muestra la foto cargada o las iniciales por defecto -->
              <img *ngIf="fotoUrl()" [src]="fotoUrl()" alt="Foto de perfil" class="avatar-img" />
              <span *ngIf="!fotoUrl()">{{ obtenerIniciales() }}</span>

              <!-- Botón de cámara (Solo activo en Modo Edición) -->
              <button
                type="button"
                class="btn-change-avatar"
                [class.disabled]="!modoEdicion()"
                (click)="abrirExploradorArchivos(fileInput)"
                title="Cambiar foto">
                <ion-icon name="camera-outline"></ion-icon>
              </button>
            </div>

            <div class="user-meta">
              <h2>{{ perfil.nombre }}</h2>
              <span class="role-badge">
                <ion-icon name="shield-checkmark-outline"></ion-icon>
                {{ perfil.rol }}
              </span>
            </div>
          </div>

          <form (ngSubmit)="guardarPerfil()" class="perfil-form">

            <!-- SECCIÓN 1: DATOS PERSONALES -->
            <div class="form-section">
              <h3>
                <ion-icon name="person-outline"></ion-icon>
                Información del Administrador
              </h3>

              <div class="grid-2-cols">
                <div class="field-group">
                  <label>Nombre Completo *</label>
                  <input type="text" [(ngModel)]="perfil.nombre" name="nombre" [disabled]="!modoEdicion()" required />
                </div>

                <div class="field-group">
                  <label>Correo Electrónico *</label>
                  <input type="email" [(ngModel)]="perfil.email" name="email" [disabled]="!modoEdicion()" required />
                </div>

                <div class="field-group">
                  <label>Teléfono de Contacto *</label>
                  <input type="tel" [(ngModel)]="perfil.telefono" name="telefono" [disabled]="!modoEdicion()" required />
                </div>

                <div class="field-group">
                  <label>Cargo / Puesto *</label>
                  <input type="text" [(ngModel)]="perfil.cargo" name="cargo" [disabled]="!modoEdicion()" required />
                </div>
              </div>
            </div>

            <!-- SECCIÓN 2: SEGURIDAD (CAMBIO DE CONTRASEÑA) -->
            <div class="form-section">
              <h3>
                <ion-icon name="lock-closed-outline"></ion-icon>
                Seguridad de la Cuenta
              </h3>

              <div class="grid-2-cols">
                <div class="field-group">
                  <label>Contraseña Actual</label>
                  <input type="password" [(ngModel)]="seguridad.passwordActual" name="passwordActual" [disabled]="!modoEdicion()" placeholder="••••••••" />
                </div>

                <div class="field-group">
                  <label>Nueva Contraseña</label>
                  <input type="password" [(ngModel)]="seguridad.passwordNueva" name="passwordNueva" [disabled]="!modoEdicion()" placeholder="Dejar en blanco para mantener" />
                </div>
              </div>
            </div>

            <!-- BOTONES DE ACCIÓN (EDITAR / GUARDAR / CANCELAR) -->
            <div class="form-actions">

              <!-- Botón Editar (Visible en modo solo lectura) -->
              <button
                *ngIf="!modoEdicion()"
                type="button"
                class="btn-edit"
                (click)="activarEdicion()">
                <ion-icon name="create-outline"></ion-icon>
                Editar Perfil
              </button>

              <!-- Botón Cancelar (Visible al editar) -->
              <button
                *ngIf="modoEdicion()"
                type="button"
                class="btn-cancel"
                (click)="cancelarEdicion()">
                Cancelar
              </button>

              <!-- Botón Guardar (Visible al editar) -->
              <button
                *ngIf="modoEdicion()"
                type="submit"
                class="btn-submit">
                <ion-icon name="save-outline"></ion-icon>
                Guardar Cambios
              </button>
            </div>
          </form>
        </main>
      </div>
    </main>
  </div>
</ion-content>
