<ion-content [fullscreen]="true" class="login-page-content">
  <div class="login-wrapper">

    <!-- SECCIÓN SUPERIOR: BRANDING -->
    <div class="brand-container">
      <div class="logo-circle">
        <img src="assets/icon/simbolo.webp" alt="DentalClinic Logo" class="brand-logo">
      </div>
      <h1 class="brand-title">DentalClinic</h1>
      <p class="brand-subtitle">Bienvenido de nuevo. Gestiona tu salud dental de forma inteligente.</p>
    </div>

    <!-- SECCIÓN CENTRAL: FORMULARIO -->
    <div class="login-card">
      <form (ngSubmit)="onLogin()">

        <div class="input-group">
          <label class="input-label">Correo electrónico</label>
          <div class="input-wrapper">
            <input
              type="email"
              name="email"
              [(ngModel)]="email"
              placeholder="ejemplo@correo.com"
              required>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">Contraseña</label>
          <div class="input-wrapper">
            <input
              type="password"
              name="password"
              [(ngModel)]="password"
              placeholder="••••••••"
              required>
          </div>
        </div>

        <div class="forgot-password-container">
          <a (click)="forgotPassword()" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="submit-btn">
          Iniciar Sesión
        </button>

      </form>
    </div>

    <!-- SECCIÓN INFERIOR: REDES SOCIALES Y REGISTRO -->
    <div class="social-login-section">
      <div class="divider-container">
        <span class="divider-text">o ingresa con</span>
      </div>

      <div class="social-buttons-row">
        <button type="button" class="social-btn google-btn" (click)="loginWithGoogle()">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.5 24c0-1.55-.15-3.24-.47-4.75H24v9h12.75c-.53 2.87-2.13 5.31-4.57 6.95l7.13 5.52C43.46 36.3 46.5 30.73 46.5 24z"/>
            <path fill="#FBBC05" d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.98-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.13-5.52c-1.97 1.32-4.51 2.11-8.76 2.11-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
        </button>
        <button type="button" class="social-btn apple-btn" (click)="loginWithApple()">
          <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple" class="apple-icon-img">
        </button>
      </div>

      <p class="signup-text">
        ¿No tienes una cuenta? <a (click)="goToRegister()" class="signup-link">Regístrate aquí</a>
      </p>
    </div>

  </div>
</ion-content>
